<div class="min-h-screen bg-gray-50">
  <app-navbar />
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Welcome back, {{ firstName() }}</h1>
      <p class="text-gray-500 mt-1 capitalize">{{ authService.user()?.role }} Dashboard</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-10">
      @for (card of cards; track card.label) {
        <a [routerLink]="card.href"
          class="bg-white rounded-2xl border border-gray-100 p-6 hover:border-gray-300 hover:shadow-md transition-all">
          <div [class]="card.color + ' w-11 h-11 rounded-xl flex items-center justify-center mb-4 text-xl'">📦</div>
          <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">{{ card.label }}</p>
          <p class="text-2xl font-extrabold text-gray-900">{{ card.value() }}</p>
        </a>
      }
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 p-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div>
        <h2 class="text-lg font-extrabold text-gray-900">Ready to add a new product?</h2>
        <p class="text-gray-500 text-sm mt-1">Fill in the details and upload images to publish instantly.</p>
      </div>
      <a routerLink="/dashboard/products/add"
        class="flex items-center px-6 py-3 bg-black text-white text-sm font-bold rounded-xl hover:bg-gray-800 transition-colors shadow-sm whitespace-nowrap">
        + Add Product
      </a>
    </div>
  </div>
  <app-footer />
</div>
