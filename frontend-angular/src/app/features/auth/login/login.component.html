<div
  class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <a routerLink="/">
      <h2
        class="text-center text-4xl font-extrabold text-gray-900 tracking-tighter mb-8 cursor-pointer"
      >
        Shoper<span class="text-blue-600">.</span>
      </h2>
    </a>
    <h2 class="text-center text-2xl font-bold text-gray-900">Welcome back</h2>
    <p class="mt-2 text-center text-sm text-gray-500">
      Don't have an account?
      <a
        routerLink="/register"
        class="font-semibold text-blue-600 hover:text-blue-500 transition-colors ml-1"
      >
        Register here
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="bg-white py-8 px-4 shadow-xl shadow-gray-100 sm:rounded-3xl sm:px-10 border border-gray-100"
    >
      @if (error()) {
        <div
          class="mb-6 bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium border border-red-100"
        >
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Email Address</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"
            >
              ✉️
            </div>
            <input
              type="email"
              formControlName="email"
              placeholder="you@example.com"
              class="block w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm placeholder-gray-500 text-gray-800"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-semibold text-gray-700"
              >Password</label
            >
          </div>
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"
            >
              🔒
            </div>
            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="block w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm placeholder-gray-500 text-gray-800"
            />
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="isLoading()"
            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-lg text-sm font-bold text-white bg-black hover:bg-gray-800 focus:outline-none transition-all disabled:opacity-70 disabled:cursor-not-allowed"
          >
            {{ isLoading() ? "Signing in..." : "Sign In" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
