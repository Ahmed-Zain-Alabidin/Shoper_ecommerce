<div
  class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <a routerLink="/">
      <h2
        class="text-center text-4xl font-extrabold text-gray-900 tracking-tighter mb-8 cursor-pointer"
      >
        Shoper<span class="text-blue-600">.</span>
      </h2>
    </a>
    <h2 class="text-center text-2xl font-bold text-gray-900">
      Create an account
    </h2>
    <p class="mt-2 text-center text-sm text-gray-500">
      Already have an account?
      <a
        routerLink="/login"
        class="font-semibold text-blue-600 hover:text-blue-500 transition-colors ml-1"
        >Sign In</a
      >
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="bg-white py-8 px-4 shadow-xl shadow-gray-100 sm:rounded-3xl sm:px-10 border border-gray-100"
    >
      @if (error()) {
        <div
          class="mb-6 bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium border border-red-100"
        >
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <!-- Full Name -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Full Name</label
          >
          <input
            type="text"
            formControlName="name"
            placeholder="John Doe"
            class="block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-800"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Email Address</label
          >
          <input
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            class="block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-800"
          />
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Phone Number</label
          >
          <input
            type="text"
            formControlName="phone"
            placeholder="+20 1xx xxx xxxx"
            class="block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-800"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Password</label
          >
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-800"
          />
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Confirm Password</label
          >
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="••••••••"
            [class]="
              passwordMismatch
                ? 'block w-full px-4 py-3.5 border border-red-300 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-red-400 transition-all text-sm text-gray-800'
                : 'block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-800'
            "
          />
          @if (passwordMismatch) {
            <p class="mt-1.5 text-xs font-semibold text-red-500">
              Passwords do not match.
            </p>
          }
        </div>

        <!-- Account Type -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5"
            >Account Type</label
          >
          <select
            formControlName="role"
            class="block w-full px-4 py-3.5 border border-gray-200 rounded-2xl bg-gray-50 focus:bg-white shadow-sm focus:ring-2 focus:ring-black focus:border-black transition-all text-sm text-gray-700 cursor-pointer"
          >
            <option value="customer">Customer</option>
            <option value="seller">Seller</option>
          </select>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="isLoading()"
            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-lg text-sm font-bold text-white bg-black hover:bg-gray-800 transition-all disabled:opacity-70 disabled:cursor-not-allowed"
          >
            {{ isLoading() ? "Creating account..." : "Create Account" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
